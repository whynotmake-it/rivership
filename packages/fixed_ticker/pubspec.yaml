name: fixed_ticker
description: A drop-in Ticker replacement that uses Timer.periodic to gate frame callbacks at a fixed interval.
version: 0.1.0
resolution: workspace
repository: https://github.com/whynotmake-it/rivership/tree/main/packages/fixed_ticker
homepage: https://whynotmake.it

topics: [animation, ticker, performance, timer]

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_test: # Required by lib/testing.dart (pumpAndSettleFixedTickers)
    sdk: flutter
  meta: ">=1.15.0 <2.0.0"

dev_dependencies:
  lintervention: ^0.3.1
